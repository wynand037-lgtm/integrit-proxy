<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InteGrit · Coach Login</title>
<style>
  :root {
    --navy:  #1a1a2e;
    --navy2: #16213e;
    --gold:  #c9a84c;
    --gold2: #e8c96a;
    --red:   #c0392b;
    --bg:    #f4f5f7;
    --white: #ffffff;
    --gray3: #dee2e6;
    --gray5: #6c757d;
    --text:  #212529;
    --radius: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 44px 40px 40px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: 3px;
  }
  .logo p {
    font-size: 11px;
    color: var(--gray5);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
  .gold-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    margin: 0 auto 28px;
    width: 60px;
  }
  h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
    text-align: center;
  }
  .error-msg {
    background: #fdf0f0;
    border: 1px solid #f5c6cb;
    color: var(--red);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }
  .error-msg.show { display: block; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray5);
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    border: 1.5px solid var(--gray3);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #f8f9fa;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  input[type="password"]:focus {
    border-color: var(--gold);
    background: var(--white);
  }
  button[type="submit"] {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    background: var(--navy);
    color: var(--gold);
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background .15s;
  }
  button[type="submit"]:hover { background: var(--navy2); }
  .client-link {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--gray5);
  }
  .client-link a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
  }
  .client-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>INTEGRIT</h1>
    <p>Life Coaching</p>
  </div>
  <div class="gold-bar"></div>
  <h2>Coach Sign In</h2>

  <div class="error-msg" id="err">Incorrect password. Please try again.</div>

  <form method="POST" action="/login">
    <div>
      <label for="password">Coach Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" required placeholder="Enter your password">
    </div>
    <button type="submit">Sign In to Dashboard</button>
  </form>

  <div class="client-link">
    Are you a client? <a href="/client/login">Sign in to your portal →</a>
  </div>
</div>

<script>
  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>
