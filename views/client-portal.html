<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InteGrit · My Coaching Portal</title>
<style>
  :root {
    --navy:   #1a1a2e;
    --navy2:  #16213e;
    --gold:   #c9a84c;
    --gold2:  #e8c96a;
    --green:  #2d6a4f;
    --green2: #40916c;
    --red:    #c0392b;
    --orange: #e07b39;
    --bg:     #f4f5f7;
    --white:  #ffffff;
    --gray1:  #f8f9fa;
    --gray2:  #e9ecef;
    --gray3:  #dee2e6;
    --gray4:  #adb5bd;
    --gray5:  #6c757d;
    --text:   #212529;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,.10);
    --shadow2: 0 4px 20px rgba(0,0,0,.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  /* ── Top bar ── */
  #topbar {
    background: var(--navy);
    color: #fff;
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #topbar .brand { font-size: 18px; font-weight: 800; color: var(--gold); letter-spacing: 2px; }
  #topbar .brand span { font-size: 12px; color: rgba(255,255,255,.4); font-weight: 400; margin-left: 10px; letter-spacing: 1px; text-transform: uppercase; }
  #topbar .spacer { flex: 1; }
  #topbar .client-name { font-size: 13px; color: rgba(255,255,255,.6); }
  #topbar a.logout {
    font-size: 12px; color: rgba(255,255,255,.4); text-decoration: none;
    padding: 6px 12px; border: 1px solid rgba(255,255,255,.15); border-radius: 6px;
    transition: all .15s;
  }
  #topbar a.logout:hover { color: #fff; border-color: rgba(255,255,255,.4); }

  /* ── Content ── */
  #content { max-width: 820px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── Welcome banner ── */
  .welcome-banner {
    background: linear-gradient(135deg, var(--navy), var(--navy2));
    border-radius: 12px;
    padding: 28px 32px;
    color: #fff;
    margin-bottom: 24px;
    box-shadow: var(--shadow2);
  }
  .welcome-banner .wb-label { font-size: 11px; color: var(--gold); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .welcome-banner h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  .welcome-banner .wb-meta { font-size: 13px; color: rgba(255,255,255,.5); }

  /* ── Overall progress card ── */
  .overall-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .overall-card .oc-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--gray5); font-weight: 700; white-space: nowrap; }
  .overall-card .progress-wrap { flex: 1; min-width: 180px; }
  .overall-card .prog-bar { height: 8px; background: var(--gray2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .overall-card .prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 4px; transition: width .5s; }
  .overall-card .prog-pct { font-size: 28px; font-weight: 800; color: var(--navy); }
  .overall-card .current-phase-badge {
    background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid rgba(201,168,76,.3);
    border-radius: 20px; padding: 6px 16px; font-size: 12px; font-weight: 700; white-space: nowrap;
  }

  /* ── Phase tabs ── */
  .phase-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
  .phase-tabs::-webkit-scrollbar { height: 0; }
  .phase-tab {
    padding: 10px 18px; border-radius: var(--radius); cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--gray5); background: var(--white);
    white-space: nowrap; transition: all .15s; box-shadow: var(--shadow);
    border: 2px solid transparent; flex-shrink: 0;
  }
  .phase-tab:hover { color: var(--navy); border-color: var(--gray3); }
  .phase-tab.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
  .phase-tab .pt-num { font-size: 10px; display: block; opacity: .6; }

  /* ── Phase header ── */
  .phase-header {
    background: linear-gradient(135deg, var(--navy), var(--navy2));
    border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px;
    color: #fff; box-shadow: var(--shadow2);
  }
  .phase-header .ph-num  { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .phase-header h2       { font-size: 20px; font-weight: 700; margin: 6px 0 4px; }
  .phase-header .ph-tag  { font-size: 13px; color: rgba(255,255,255,.6); font-style: italic; }
  .phase-progress { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .phase-progress .prog-bar  { flex: 1; height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; }
  .phase-progress .prog-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .3s; }
  .phase-progress .prog-label { font-size: 11px; color: rgba(255,255,255,.5); white-space: nowrap; }

  /* ── Section cards ── */
  .section-card {
    background: var(--white);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border-left: 4px solid var(--gray3);
    transition: border-color .2s;
  }
  .section-card.status-complete    { border-left-color: var(--green); }
  .section-card.status-in-progress { border-left-color: var(--orange); }
  .section-card.status-attention   { border-left-color: var(--red); }

  .section-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: var(--gray1); }
  .sec-num {
    width: 28px; height: 28px; border-radius: 50%; background: var(--gray2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--gray5); flex-shrink: 0;
  }
  .sec-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
  .sec-badge {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-complete    { background: #d4edda; color: var(--green); }
  .badge-in-progress { background: #fef3cd; color: #856404; }
  .badge-attention   { background: #f8d7da; color: var(--red); }
  .badge-not-started { background: var(--gray2); color: var(--gray5); }
  .sec-chevron { color: var(--gray4); font-size: 14px; transition: transform .2s; }
  .section-card.open .sec-chevron { transform: rotate(90deg); }

  .section-body {
    display: none;
    padding: 0 18px 20px;
    border-top: 1px solid var(--gray2);
  }
  .section-card.open .section-body { display: block; }

  /* ── Outcome box ── */
  .outcome-block {
    margin-top: 16px;
  }
  .outcome-block .ob-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--gray5); font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .ob-tag {
    background: rgba(201,168,76,.15); color: var(--gold); border-radius: 4px;
    padding: 1px 6px; font-size: 9px; font-weight: 700; letter-spacing: .5px;
  }
  .outcome-block .ob-text {
    background: linear-gradient(135deg, #fffbf0, #fff9e8);
    border: 1px solid #f0d68a;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }
  .outcome-block .ob-empty {
    font-size: 13px;
    color: var(--gray4);
    font-style: italic;
    padding: 10px 0;
  }

  /* ── Commitment block ── */
  .commitment-block {
    margin-top: 14px;
    background: var(--gray1);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .commitment-block .cb-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--gray5); font-weight: 700; white-space: nowrap; margin-top: 1px;
  }
  .commitment-block .cb-text {
    flex: 1; font-size: 13px; color: var(--text); line-height: 1.5;
  }
  .commitment-block .cb-status {
    font-size: 12px; font-weight: 700; white-space: nowrap; padding: 4px 10px;
    border-radius: 12px; flex-shrink: 0;
  }
  .cs-met    { background: #d4edda; color: var(--green); }
  .cs-missed { background: #f8d7da; color: var(--red); }
  .cs-none   { background: var(--gray2); color: var(--gray5); }

  .sec-updated { font-size: 10px; color: var(--gray4); margin-top: 12px; }

  /* ── Empty section ── */
  .no-content {
    padding: 20px 0;
    font-size: 13px;
    color: var(--gray4);
    font-style: italic;
    text-align: center;
  }

  /* ── Loading ── */
  #loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--gray5);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--gray3);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">INTEGRIT <span>My Portal</span></div>
  <div class="spacer"></div>
  <div class="client-name" id="client-name-header"></div>
  <a class="logout" href="/client/logout">Sign out</a>
</div>

<div id="content">
  <div id="loading">
    <div class="spinner"></div>
    Loading your coaching journey…
  </div>
  <div id="portal" style="display:none;"></div>
</div>

<script>
const PHASES = {
  1: {
    title: 'Identity Foundation', weeks: 'Weeks 1–2',
    tagline: 'Everything changes when you change who you believe you are.',
    sections: [
      { id: 1, title: 'The Person You Are Calling Yourself' },
      { id: 2, title: 'Casting Votes for a New Identity' },
      { id: 3, title: 'What You Want Tells You Who You Are' },
      { id: 4, title: 'The Stories That Have Run You' },
      { id: 5, title: 'Mapping Your Triggers' },
      { id: 6, title: 'A Letter to Your Future Self' }
    ]
  },
  2: {
    title: 'Desire, Vision & Purpose', weeks: 'Weeks 3–4',
    tagline: 'You will not sustain what you do not truly want.',
    sections: [
      { id: 1, title: 'The Difference Between Wanting and Desiring' },
      { id: 2, title: 'Your Burning Desire — Written and Specific' },
      { id: 3, title: 'Desire Reveals Identity — Checking the Connection' },
      { id: 4, title: 'Your Self-Sabotage Pattern' },
      { id: 5, title: 'Who Is Telling You What Is Possible?' },
      { id: 6, title: 'The Decision — Full Commitment' }
    ]
  },
  3: {
    title: 'Building Your System', weeks: 'Weeks 5–8',
    tagline: 'Your habits will only be as strong as the system behind them.',
    sections: [
      { id: 1, title: 'Small is Not Weak — It Is Strategic' },
      { id: 2, title: 'Designing Your Environment' },
      { id: 3, title: 'The Four Laws — Making Habits Work With You' },
      { id: 4, title: 'Stacking Habits Onto What Already Works' },
      { id: 5, title: 'Preloading Your Decisions' },
      { id: 6, title: 'Your Written Coaching Plan' },
      { id: 7, title: 'Your Accountability Structure' }
    ]
  },
  4: {
    title: 'Momentum & Resilience', weeks: 'Weeks 9–12',
    tagline: 'Growth is not a straight line. Learning to stay in it is the work.',
    sections: [
      { id: 1, title: 'Reading Your Data Honestly' },
      { id: 2, title: 'Never Miss Twice' },
      { id: 3, title: 'The Plateau Is Part of the Process' },
      { id: 4, title: 'When Motivation Goes Quiet' },
      { id: 5, title: 'The Five Resilience Skills' },
      { id: 6, title: 'A Letter to the Version of You That Wants to Quit' }
    ]
  },
  5: {
    title: 'Mastery & New Beginning', weeks: 'Weeks 13–16+',
    tagline: 'You are not finishing a program. You are starting a life.',
    sections: [
      { id: 1, title: 'The Identity Confirmation' },
      { id: 2, title: 'The Full Habit Audit' },
      { id: 3, title: 'Reviewing Your Desire' },
      { id: 4, title: 'Your Self-Coaching Questions' },
      { id: 5, title: 'Building Your Ongoing Mastermind' },
      { id: 6, title: 'A Letter Forward' }
    ]
  }
};

let client = null;
let activePhase = 1;

async function init() {
  const res = await fetch('/api/client/me');
  if (res.status === 401) { location.href = '/client/login'; return; }
  client = await res.json();
  activePhase = client.currentPhase || 1;
  document.getElementById('client-name-header').textContent = client.name;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('portal').style.display  = 'block';
  renderPortal();
}

function getOverallProgress() {
  let total = 0, done = 0;
  for (let p = 1; p <= 5; p++) {
    PHASES[p].sections.forEach(s => {
      total++;
      const key = `${p}-${s.id}`;
      if (client.sections && client.sections[key] && client.sections[key].status === 'complete') done++;
    });
  }
  return total ? Math.round((done / total) * 100) : 0;
}

function getPhaseProgress(phase) {
  const secs = PHASES[phase].sections;
  let done = 0;
  secs.forEach(s => {
    const key = `${phase}-${s.id}`;
    if (client.sections && client.sections[key] && client.sections[key].status === 'complete') done++;
  });
  return { done, total: secs.length };
}

function renderPortal() {
  const pct = getOverallProgress();
  const portal = document.getElementById('portal');

  // Welcome banner
  let html = `
    <div class="welcome-banner">
      <div class="wb-label">Your InteGrit Journey</div>
      <h1>Welcome back, ${esc(client.name.split(' ')[0])}</h1>
      <div class="wb-meta">Program started ${fmtDate(client.programStartDate)}</div>
    </div>

    <div class="overall-card">
      <div>
        <div class="oc-label">Overall Progress</div>
        <div class="prog-pct">${pct}%</div>
      </div>
      <div class="progress-wrap">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="current-phase-badge">Current: Phase ${client.currentPhase} — ${PHASES[client.currentPhase].title.split(' ')[0]}…</div>
    </div>

    <div class="phase-tabs" id="phase-tabs">
      ${[1,2,3,4,5].map(p => `
        <div class="phase-tab ${p === activePhase ? 'active' : ''}" onclick="switchPhase(${p})">
          <span class="pt-num">Phase ${p}</span>
          ${PHASES[p].title.split(' ')[0]}…
        </div>`).join('')}
    </div>

    <div id="phase-content"></div>`;

  portal.innerHTML = html;
  renderPhaseContent();
}

function renderPhaseContent() {
  const phase = PHASES[activePhase];
  const prog  = getPhaseProgress(activePhase);
  const pct   = Math.round((prog.done / prog.total) * 100);

  let html = `
    <div class="phase-header">
      <div class="ph-num">Phase ${activePhase} of 5 · ${phase.weeks}</div>
      <h2>${phase.title}</h2>
      <div class="ph-tag">${phase.tagline}</div>
      <div class="phase-progress">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-label">${prog.done}/${prog.total} sections complete</div>
      </div>
    </div>`;

  phase.sections.forEach(s => {
    const key    = `${activePhase}-${s.id}`;
    const sec    = (client.sections && client.sections[key]) || {};
    const status = sec.status || 'not-started';
    const badgeClass = { complete:'badge-complete', 'in-progress':'badge-in-progress', attention:'badge-attention', 'not-started':'badge-not-started' }[status];
    const badgeLabel = { complete:'Complete', 'in-progress':'In Progress', attention:'Needs Attention', 'not-started':'Not Started' }[status];

    const hasOutcome    = !!(sec.coachOutcome && sec.coachOutcome.trim());
    const hasCommitment = !!(sec.commitment   && sec.commitment.trim());

    const outcomeHtml = hasOutcome
      ? `<div class="ob-text">${esc(sec.coachOutcome)}</div>`
      : `<div class="ob-empty">No coaching outcome recorded yet for this section.</div>`;

    let commitHtml = '';
    if (hasCommitment) {
      const cs = sec.commitmentStatus || 'none';
      const csClass = cs === 'met' ? 'cs-met' : cs === 'missed' ? 'cs-missed' : 'cs-none';
      const csLabel = cs === 'met' ? '✓ Met' : cs === 'missed' ? '✗ Missed' : '○ Pending';
      commitHtml = `
        <div class="commitment-block">
          <div class="cb-label">Commitment</div>
          <div class="cb-text">${esc(sec.commitment)}</div>
          <div class="cb-status ${csClass}">${csLabel}</div>
        </div>`;
    }

    const updatedHtml = sec.lastUpdated
      ? `<div class="sec-updated">Last updated ${fmtDate(sec.lastUpdated)}</div>`
      : '';

    html += `
      <div class="section-card status-${status}" id="sec-${key}">
        <div class="section-header" onclick="toggleSection('${key}')">
          <div class="sec-num">${s.id}</div>
          <div class="sec-title">${esc(s.title)}</div>
          <span class="sec-badge ${badgeClass}">${badgeLabel}</span>
          <span class="sec-chevron">▶</span>
        </div>
        <div class="section-body">
          <div class="outcome-block">
            <div class="ob-label">
              Coaching Outcome &amp; Feedback
              <span class="ob-tag">FROM YOUR COACH</span>
            </div>
            ${outcomeHtml}
          </div>
          ${commitHtml}
          ${updatedHtml}
        </div>
      </div>`;
  });

  document.getElementById('phase-content').innerHTML = html;
}

function switchPhase(p) {
  activePhase = p;
  // Update tabs
  document.querySelectorAll('.phase-tab').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === p);
  });
  renderPhaseContent();
}

function toggleSection(key) {
  document.getElementById(`sec-${key}`).classList.toggle('open');
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
